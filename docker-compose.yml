version: '3.8'

services:

  # ── MESSAGE BROKER ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # Management UI (http://localhost:15672, guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API GATEWAY (PUBLIC ENTRY POINT) ────────────────────────────────────────
  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports:
      - "8080:8000"       # Public Swagger UI: http://localhost:8080/docs
    environment:
      PUBLIC_BASE_URL: http://localhost:8080
      AUTH_SERVICE_URL: http://auth_service:8000
      FLIGHT_SERVICE_URL: http://flight_service:8000
      BOOKING_SERVICE_URL: http://booking_service:8000
      BAGGAGE_SERVICE_URL: http://baggage_service:8000
      SCHEDULE_SERVICE_URL: http://schedule_service:8000
      PAYMENT_SERVICE_URL: http://payment_service:8000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-us-east-1_hpW84ZtH4}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID:-14hg3aomr5krmmac2ivh7q25bv}
      COGNITO_ISSUER: ${COGNITO_ISSUER:-https://cognito-idp.us-east-1.amazonaws.com/us-east-1_hpW84ZtH4}
    depends_on:
      - auth_service
      - flight_service
      - booking_service
      - baggage_service
      - schedule_service
      - payment_service
    restart: on-failure

  # ── AUTH SERVICE (JWT) ──────────────────────────────────────────────────────
  auth_service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    expose:
      - "8000"            # Internal only; access through API Gateway
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq

  # ── FLIGHT SERVICE ─────────────────────────────────────────────────────────
  flight_service:
    build:
      context: .
      dockerfile: services/flight_service/Dockerfile
    expose:
      - "8000"            # Internal only; access through API Gateway
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── BOOKING SERVICE ────────────────────────────────────────────────────────
  booking_service:
    build:
      context: .
      dockerfile: services/booking_service/Dockerfile
    expose:
      - "8000"            # Internal only; access through API Gateway
    environment:
      FLIGHT_SERVICE_URL: http://flight_service:8000
      BOOKING_STORAGE_BACKEND: sqlite
    depends_on:
      - flight_service
      - auth_service

  # ── PAYMENT SERVICE ───────────────────────────────────────────────────────
  payment_service:
    build:
      context: .
      dockerfile: services/payment_service/Dockerfile
    expose:
      - "8000"            # Internal only; access through API Gateway
    environment:
      BOOKING_SERVICE_URL: http://booking_service:8000
      PAYMENT_STORAGE_BACKEND: sqlite
      PAYMENT_EVENTS_ENABLED: "false"
      EVENT_BUS_NAME: "default"
      EVENT_SOURCE: "aerolink.payment"
    depends_on:
      - booking_service

  # ── BAGGAGE SERVICE ────────────────────────────────────────────────────────
  baggage_service:
    build:
      context: .
      dockerfile: services/baggage_service/Dockerfile
    expose:
      - "8000"            # Internal only; access through API Gateway
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── SCHEDULE SERVICE ───────────────────────────────────────────────────────
  schedule_service:
    build:
      context: .
      dockerfile: services/schedule_service/Dockerfile
    expose:
      - "8000"            # Internal only; access through API Gateway
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── EVENT CONSUMER ─────────────────────────────────────────────────────────
  event_consumer:
    build:
      context: .
      dockerfile: services/event_consumer/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
